[tasks.build]
description = "Build the krang binary"
run = "go build -ldflags \"-s -w -X github.com/dpetersen/krang/cmd.Version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)\" -o krang ."

[tasks.fmt]
description = "Format Go source files"
run = "gofmt -w ."

[tasks.check]
description = "Check Go formatting"
run = "test -z \"$(gofmt -l .)\""

[tasks.test]
description = "Run unit tests"
depends = ["check"]
run = "go test ./..."

[tasks."test:integration"]
description = "Run integration tests (requires tmux)"
run = "go test -v -count=1 -timeout 300s -tags=integration ./internal/integration/"

[tasks.install]
description = "Build and install krang to KRANG_INSTALL_DIR (default: ~/.local/bin)"
depends = ["build"]
run = """
dest="${KRANG_INSTALL_DIR:-$HOME/.local/bin}"
mkdir -p "$dest"
cp krang "$dest/krang"
echo "Installed krang to $dest/krang"
"""

[tasks.setup]
description = "Install Claude Code hooks and configure krang (dev config)"
depends = ["build"]
env = { KRANG_CONFIG = ".krang-dev-config.yaml" }
run = "./krang setup"

[tasks.run]
description = "Build, install hooks, and launch krang (dev DB)"
depends = ["build", "setup"]
env = { KRANG_DB = ".krang-dev.db", KRANG_CONFIG = ".krang-dev-config.yaml" }
run = "./krang"
